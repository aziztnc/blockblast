<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast - Web Versiyonu</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .score-container {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
            background: #1e293b;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .score-val {
            color: #38bdf8;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            background: #1e293b;
            padding: 8px;
            border-radius: 12px;
            width: 90vw;
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .cell {
            background: #334155;
            border-radius: 6px;
            transition: background 0.1s ease, transform 0.1s ease;
        }

        .cell.filled {
            box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
        }

        #pieces-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90vw;
            max-width: 400px;
            height: 120px;
            margin-top: 20px;
            background: #1e293b;
            border-radius: 12px;
            padding: 10px;
        }

        .piece-holder {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .piece {
            display: grid;
            gap: 2px;
            position: absolute;
            cursor: grab;
            transform-origin: center center;
            transition: transform 0.1s ease;
        }

        .piece:active {
            cursor: grabbing;
        }

        .piece-cell {
            border-radius: 4px;
        }

        #drag-overlay {
            position: fixed;
            pointer-events: none;
            display: grid;
            gap: 2px;
            z-index: 9999;
            display: none;
            opacity: 0.95;
        }

        .color-1 { background: #ef4444; }
        .color-2 { background: #3b82f6; }
        .color-3 { background: #10b981; }
        .color-4 { background: #f59e0b; }
        .color-5 { background: #a855f7; }

        #game-over-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            display: none;
        }

        .game-over-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-restart {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-restart:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin: 5px 0; font-size: 28px; color: #38bdf8;">BLOCK BLAST</h1>
        <div class="score-container">
            <div>Skor: <span id="score" class="score-val">0</span></div>
            <div>En Yüksek: <span id="high-score" class="score-val">0</span></div>
        </div>
    </div>

    <div id="board"></div>

    <div id="pieces-container">
        <div class="piece-holder" id="holder-0"></div>
        <div class="piece-holder" id="holder-1"></div>
        <div class="piece-holder" id="holder-2"></div>
    </div>

    <div id="drag-overlay"></div>

    <div id="game-over-screen">
        <div class="game-over-box">
            <h2 style="color: #ef4444; margin-top: 0;">HAMLE KALMADI!</h2>
            <p style="font-size: 18px;">Skorun: <span id="final-score" style="color:#38bdf8; font-weight:bold;">0</span></p>
            <button class="btn-restart" onclick="restartGame()">Yeniden Başla</button>
        </div>
    </div>

<script>
const boardSize = 8;
let boardState = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
let score = 0;
let highScore = localStorage.getItem("blockBlastHighScore") || 0;

const blockTemplates = [
    { structure: [[1]], color: 1 }, 
    { structure: [[1, 1]], color: 2 }, 
    { structure: [[1], [1]], color: 2 }, 
    { structure: [[1, 1, 1]], color: 3 }, 
    { structure: [[1], [1], [1]], color: 3 }, 
    { structure: [[1, 1], [1, 1]], color: 4 }, 
    { structure: [[1, 1, 1], [0, 1, 0]], color: 5 }, 
    { structure: [[1, 0], [1, 0], [1, 1]], color: 1 }, 
];

let currentPieces = [null, null, null];
let activeDrag = null; 

const boardEl = document.getElementById("board");
const dragOverlay = document.getElementById("drag-overlay");

function initGame() {
    document.getElementById("high-score").innerText = highScore;
    createBoard();
    generateNewPieces();
    window.addEventListener("resize", handleResize);
}

function createBoard() {
    boardEl.innerHTML = "";
    for (let r = 0; r < boardSize; r++) {
        for (let c = 0; c < boardSize; c++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.row = r;
            cell.dataset.col = c;
            boardEl.appendChild(cell);
        }
    }
    drawBoard();
}

function drawBoard() {
    const cells = boardEl.querySelectorAll(".cell");
    cells.forEach(cell => {
        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        const val = boardState[r][c];
        
        cell.className = "cell";
        cell.style.background = "";
        
        if (val > 0) {
            cell.classList.add("filled", `color-${val}`);
        }
    });
}

function generateNewPieces() {
    for (let i = 0; i < 3; i++) {
        const randIndex = Math.floor(Math.random() * blockTemplates.length);
        currentPieces[i] = JSON.parse(JSON.stringify(blockTemplates[randIndex]));
        renderPiece(i);
    }
    checkGameOver();
}

function renderPiece(index) {
    const holder = document.getElementById(`holder-${index}`);
    holder.innerHTML = "";
    
    if (!currentPieces[index]) return;

    const pieceData = currentPieces[index];
    const piece = document.createElement("div");
    piece.classList.add("piece");
    piece.dataset.index = index;
    
    const rows = pieceData.structure.length;
    const cols = pieceData.structure[0].length;
    
    piece.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    piece.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    
    const cellSize = 18; 
    piece.style.width = `${cols * cellSize + (cols-1)*2}px`;
    piece.style.height = `${rows * cellSize + (rows-1)*2}px`;

    pieceData.structure.forEach((row) => {
        row.forEach((val) => {
            const cell = document.createElement("div");
            cell.style.width = `${cellSize}px`;
            cell.style.height = `${cellSize}px`;
            if (val === 1) {
                cell.classList.add("piece-cell", `color-${pieceData.color}`);
            }
            piece.appendChild(cell);
        });
    });

    holder.appendChild(piece);
    
    piece.addEventListener("mousedown", (e) => startDrag(e, index, false));
    piece.addEventListener("touchstart", (e) => startDrag(e, index, true), { passive: false });
}

function startDrag(e, index, isTouch) {
    if (e.cancelable) e.preventDefault();
    const pieceData = currentPieces[index];
    if (!pieceData) return;

    const point = isTouch ? e.touches[0] : e;
    
    activeDrag = {
        index: index,
        pieceData: pieceData,
        isTouch: isTouch
    };

    dragOverlay.innerHTML = "";
    const rows = pieceData.structure.length;
    const cols = pieceData.structure[0].length;
    dragOverlay.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    dragOverlay.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    
    const boardCellWidth = (boardEl.offsetWidth - 16 - (7 * 4)) / 8; 
    dragOverlay.style.width = `${cols * boardCellWidth + (cols - 1) * 4}px`;
    dragOverlay.style.height = `${rows * boardCellWidth + (rows - 1) * 4}px`;

    pieceData.structure.forEach((row) => {
        row.forEach((val) => {
            const cell = document.createElement("div");
            if (val === 1) {
                cell.classList.add("piece-cell", `color-${pieceData.color}`);
            }
            dragOverlay.appendChild(cell);
        });
    });

    dragOverlay.style.display = "grid";
    moveDragOverlay(point.clientX, point.clientY);

    if (isTouch) {
        window.addEventListener("touchmove", onDragMove, { passive: false });
        window.addEventListener("touchend", onDragEnd);
    } else {
        window.addEventListener("mousemove", onDragMove);
        window.addEventListener("mouseup", onDragEnd);
    }
    
    document.getElementById(`holder-${index}`).style.opacity = "0.3";
}

function onDragMove(e) {
    if (!activeDrag) return;
    if (e.cancelable) e.preventDefault();
    const point = activeDrag.isTouch ? e.touches[0] : e;
    moveDragOverlay(point.clientX, point.clientY);
}

function moveDragOverlay(clientX, clientY) {
    const offset = activeDrag.isTouch ? 70 : 30; 
    dragOverlay.style.left = `${clientX - dragOverlay.offsetWidth / 2}px`;
    dragOverlay.style.top = `${clientY - dragOverlay.offsetHeight - offset}px`;
}

function onDragEnd(e) {
    if (!activeDrag) return;

    if (activeDrag.isTouch) {
        window.removeEventListener("touchmove", onDragMove);
        window.removeEventListener("touchend", onDragEnd);
    } else {
        window.removeEventListener("mousemove", onDragMove);
        window.removeEventListener("mouseup", onDragEnd);
    }

    dragOverlay.style.display = "none";
    document.getElementById(`holder-${activeDrag.index}`).style.opacity = "1";

    // KESİN ÇÖZÜM: Parçanın tam orta koordinatını bularak tahtaya hizalıyoruz
    const dragRect = dragOverlay.getBoundingClientRect();
    const dropX = dragRect.left + (dragRect.width / 2);
    const dropY = dragRect.top + (dragRect.height / 2);

    const targetCell = document.elementFromPoint(dropX, dropY);
    if (targetCell && targetCell.classList.contains("cell")) {
        const targetRow = parseInt(targetCell.dataset.row);
        const targetCol = parseInt(targetCell.dataset.col);
        
        if (canPlacePiece(activeDrag.pieceData, targetRow, targetCol)) {
            placePiece(activeDrag.pieceData, targetRow, targetCol);
            currentPieces[activeDrag.index] = null;
            document.getElementById(`holder-${activeDrag.index}`).innerHTML = "";
            
            if (currentPieces.every(p => p === null)) {
                generateNewPieces();
            } else {
                checkGameOver();
            }
        }
    }

    activeDrag = null;
}

function canPlacePiece(piece, startRow, startCol) {
    for (let r = 0; r < piece.structure.length; r++) {
        for (let c = 0; c < piece.structure[r].length; c++) {
            if (piece.structure[r][c] === 1) {
                const targetR = startRow + r;
                const targetC = startCol + c;
                
                if (targetR >= boardSize || targetC >= boardSize || boardState[targetR][targetC] > 0) {
                    return false;
                }
            }
        }
    }
    return true;
}

function placePiece(piece, startRow, startCol) {
    let pieceScore = 0;
    for (let r = 0; r < piece.structure.length; r++) {
        for (let c = 0; c < piece.structure[r].length; c++) {
            if (piece.structure[r][c] === 1) {
                boardState[startRow + r][startCol + c] = piece.color;
                pieceScore += 10;
            }
        }
    }
    score += pieceScore;
    checkMatches();
    drawBoard();
    updateScore();
}

function checkMatches() {
    let rowsToClear = [];
    let colsToClear = [];

    for (let r = 0; r < boardSize; r++) {
        if (boardState[r].every(val => val > 0)) {
            rowsToClear.push(r);
        }
    }

    for (let c = 0; c < boardSize; c++) {
        let colFilled = true;
        for (let r = 0; r < boardSize; r++) {
            if (boardState[r][c] === 0) {
                colFilled = false;
                break;
            }
        }
        if (colFilled) {
            colsToClear.push(c);
        }
    }

    rowsToClear.forEach(r => {
        boardState[r] = Array(boardSize).fill(0);
        score += 100;
    });

    colsToClear.forEach(c => {
        for (let r = 0; r < boardSize; r++) {
            boardState[r][c] = 0;
        }
        score += 100;
    });
}

function updateScore() {
    document.getElementById("score").innerText = score;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem("blockBlastHighScore", highScore);
        document.getElementById("high-score").innerText = highScore;
    }
}

function checkGameOver() {
    let hasValidMove = false;

    for (let i = 0; i < 3; i++) {
        const piece = currentPieces[i];
        if (!piece) continue;

        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (canPlacePiece(piece, r, c)) {
                    hasValidMove = true;
                    break;
                }
            }
            if (hasValidMove) break;
        }
        if (hasValidMove) break;
    }

    if (!hasValidMove && currentPieces.some(p => p !== null)) {
        document.getElementById("final-score").innerText = score;
        document.getElementById("game-over-screen").style.display = "flex";
    }
}

function restartGame() {
    boardState = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
    score = 0;
    updateScore();
    document.getElementById("game-over-screen").style.display = "none";
    createBoard();
    generateNewPieces();
}

function handleResize() {
    if (activeDrag) {
        const boardCellWidth = (boardEl.offsetWidth - 16 - (7 * 4)) / 8;
        const cols = activeDrag.pieceData.structure[0].length;
        const rows = activeDrag.pieceData.structure.length;
        dragOverlay.style.width = `${cols * boardCellWidth + (cols - 1) * 4}px`;
        dragOverlay.style.height = `${rows * boardCellWidth + (rows - 1) * 4}px`;
    }
}

initGame();
</script>

</body>
</html>
